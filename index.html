<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LSE RNS Digest</title>
<style>
body{font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;font-size:14px;color:#111;margin:24px auto;max-width:1100px;padding:0 16px;background:#fff}
h1{font-size:20px;margin:0 0 4px}
.meta{color:#666;font-size:13px;margin-bottom:16px}
#stickybar{position:sticky;top:0;background:#fff;z-index:20;padding:10px 0 4px;border-bottom:1px solid #ddd;margin-bottom:10px}
.controls{margin-bottom:6px}
.controls input,.controls select{font:inherit;padding:6px 8px;border:1px solid #bbb;border-radius:3px;margin-right:8px}
.controls input{width:320px;max-width:100%}
.controls button{font:inherit;padding:6px 12px;border:1px solid #bbb;border-radius:3px;background:#f6f6f6;cursor:pointer;margin-right:8px}
.controls button:disabled{color:#999;cursor:default}
#books button{font:inherit;font-size:13px;padding:5px 11px;border:1px solid #bbb;border-radius:3px;background:#f6f6f6;cursor:pointer;margin:0 6px 6px 0}
#books button.on{background:#333;color:#fff;border-color:#333}
#catPanel{position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1px solid #bbb;border-radius:3px;box-shadow:0 2px 8px rgba(0,0,0,.12);padding:8px 10px;max-height:320px;overflow:auto;z-index:30;min-width:260px}
#catPanel label{display:block;font-size:13px;padding:2px 0;white-space:nowrap;cursor:pointer}
#catPanel .quick{font-size:12px;margin-bottom:6px;border-bottom:1px solid #eee;padding-bottom:6px}
#catPanel .quick a{margin-right:10px;cursor:pointer}
td.sel,th.sel{width:26px;text-align:center}
td.sel input,th.sel input{cursor:pointer}
table{border-collapse:collapse;width:100%}
th{text-align:left;font-size:12px;color:#444;border-bottom:2px solid #333;padding:6px 8px;white-space:nowrap}
td{border-bottom:1px solid #ddd;padding:7px 8px;vertical-align:top}
td.time{white-space:nowrap;font-variant-numeric:tabular-nums;color:#555}
td.co b{font-weight:600}
td.co .bbg{display:inline-block;color:#333;background:#f0f0f0;border:1px solid #ccc;border-radius:3px;font-size:12px;padding:0 5px;margin-top:2px;cursor:pointer;white-space:nowrap}
td.co .bbg:hover{background:#e4e4e4}
td.cat{font-size:12px;color:#555;white-space:nowrap}
td.sm{color:#333;font-size:13px}
td.cm{font-size:13px}
td.cm.pos{background:#e9f5ec}
td.cm.neg{background:#fbebea}
a{color:#0645ad;text-decoration:none}
a:hover{text-decoration:underline}
.state{color:#666;padding:40px 0}
.foot{color:#777;font-size:12px;margin-top:20px}
@media (max-width:760px){
  table,thead,tbody,tr,td,th{display:block}
  thead{display:none}
  tr{border-bottom:2px solid #ccc;padding:8px 0}
  td{border:none;padding:2px 0}
  td.time{color:#555;font-size:12px}
}
</style>
</head>
<body>
<h1>LSE RNS Digest <span style="font-size:13px;font-weight:400;color:#777">— Joshua Middleton</span></h1>
<div class="meta" id="meta">Loading…</div>
<div id="stickybar">
<div id="books" style="margin-bottom:10px" hidden></div>
<div class="controls" id="controls" hidden>
  <input id="q" type="search" placeholder="Search…" aria-label="Search">
  <span style="position:relative;display:inline-block;margin-right:8px">
    <button id="catBtn" type="button">Categories ▾</button>
    <div id="catPanel" hidden></div>
  </span>
  <button id="refresh" title="Fetch the latest digest">Refresh</button>
  <a href="https://github.com/joshmiddleton123-ux/LSE-DIGESt/actions/workflows/digest.yml" target="_blank" rel="noopener" style="font-size:13px;margin-right:8px" title="Opens GitHub - needs repo access. Use 'Run workflow' there, then Refresh here.">Run now ↗</a>
  <button id="copySel" disabled>Copy selected (0)</button>
  <span id="count" style="color:#666;font-size:13px"></span>
</div>
</div>
<div id="out"><div class="state">Loading today's announcements…</div></div>
<p class="foot">Summaries are automated and for information only — not investment advice. Maintained by Joshua Middleton.</p>

<script>
let items=[], q='', book='';
const hiddenCats=new Set();
let books={}; // name -> Set of normalised tickers
const selected=new Set();

function parseCSV(text){
  const rows=[]; let row=[], f='', inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){ if(c==='"'){ if(text[i+1]==='"'){f+='"';i++;} else inQ=false; } else f+=c; }
    else{
      if(c==='"') inQ=true;
      else if(c===','){row.push(f);f='';}
      else if(c==='\n'||c==='\r'){ if(c==='\r'&&text[i+1]==='\n')i++; row.push(f);f=''; if(row.length>1||row[0]!=='')rows.push(row); row=[]; }
      else f+=c;
    }
  }
  if(f!==''||row.length){row.push(f);rows.push(row);}
  const h=rows.shift();
  return rows.map(r=>Object.fromEntries(h.map((k,i)=>[k,r[i]??''])));
}

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

function shortName(n){
  let s=(n||'').trim();
  const suf=/\s+(plc\.?|p\.l\.c\.?|limited|ltd\.?|ld|inc\.?|s\.a\.?|sa|ag|nv|group|holdings|\(holdings\))$/i;
  while(suf.test(s)) s=s.replace(suf,'');
  return s||n;
}
function bbg(t){
  if(!t) return '';
  return '{'+t.replace(/\.$/,'/').toUpperCase()+' LN Equity}';
}
function copyBbg(el,t){
  navigator.clipboard&&navigator.clipboard.writeText(t).then(()=>{
    const o=el.textContent; el.textContent='copied'; setTimeout(()=>el.textContent=o,700);
  });
}
function url(it){
  const slug=(it.headline||'x').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||'x';
  return `https://www.londonstockexchange.com/news-article/${encodeURIComponent(it.ticker||'x')}/${slug}/${it.news_id}`;
}

function normTick(t){return (t||'').toUpperCase().replace(/[^A-Z0-9]/g,'');}

function render(){
  const v=items.filter(it=>{
    if(book && !(books[book]&&books[book].has(normTick(it.ticker)))) return false;
    if(hiddenCats.has(it.category||'')) return false;
    if(q){const s=(it.company+' '+it.ticker+' '+it.headline+' '+(it.brief||'')+' '+it.summary+' '+it.retail_take).toLowerCase();
      if(!s.includes(q)) return false;}
    return true;
  });
  document.getElementById('count').textContent=`${v.length} of ${items.length}`;
  if(!v.length){document.getElementById('out').innerHTML='<div class="state">Nothing matches.</div>';return;}
  let h='<table><thead><tr><th class="sel"><input type="checkbox" id="selAll" title="Select all shown"></th><th>Time</th><th>Company</th><th>Category</th><th>Headline</th><th>Summary</th><th>Comment</th></tr></thead><tbody>';
  for(const it of v){
    h+=`<tr>
      <td class="sel"><input type="checkbox" data-id="${esc(it.news_id)}" ${selected.has(it.news_id)?'checked':''}></td>
      <td class="time">${esc(it.time)}</td>
      <td class="co"><b>${esc(it.company)}</b>${it.ticker?`<br><span class="bbg" title="Click to copy for Bloomberg chat" onclick="copyBbg(this,'${esc(bbg(it.ticker))}')">${esc(bbg(it.ticker))}</span>`:''}</td>
      <td class="cat">${esc(it.category)}</td>
      <td><a href="${url(it)}" target="_blank" rel="noopener">${esc(it.headline)}</a>${it.brief?`<br><span style="color:#444">${esc(it.brief)}</span>`:''}</td>
      <td class="sm">${esc(it.summary)}</td>
      <td class="cm ${it.sentiment==='positive'?'pos':it.sentiment==='negative'?'neg':''}">${esc(it.retail_take)}</td>
    </tr>`;
  }
  document.getElementById('out').innerHTML=h+'</tbody></table>';
  document.querySelectorAll('td.sel input').forEach(cb=>{
    cb.addEventListener('change',()=>{ cb.checked?selected.add(cb.dataset.id):selected.delete(cb.dataset.id); syncSel(v); });
  });
  const all=document.getElementById('selAll');
  if(all){ all.checked=v.length>0&&v.every(it=>selected.has(it.news_id));
    all.onchange=()=>{ v.forEach(it=>all.checked?selected.add(it.news_id):selected.delete(it.news_id)); render(); }; }
  syncSel(v);
}

function syncSel(v){
  const btn=document.getElementById('copySel');
  btn.disabled=selected.size===0;
  btn.textContent=`Copy selected (${selected.size})`;
}

function buildCatPanel(){
  const cats=[...new Set(items.map(i=>i.category||''))].filter(Boolean).sort();
  const panel=document.getElementById('catPanel');
  panel.innerHTML='<div class="quick"><a id="catAll">All</a><a id="catNone">None</a></div>';
  for(const c of cats){
    const l=document.createElement('label');
    const cb=document.createElement('input');
    cb.type='checkbox'; cb.checked=!hiddenCats.has(c);
    cb.addEventListener('change',()=>{cb.checked?hiddenCats.delete(c):hiddenCats.add(c);syncCatBtn(cats);render();});
    l.appendChild(cb); l.appendChild(document.createTextNode(' '+c));
    panel.appendChild(l);
  }
  panel.querySelector('#catAll').onclick=()=>{hiddenCats.clear();buildCatPanel();syncCatBtn(cats);render();};
  panel.querySelector('#catNone').onclick=()=>{cats.forEach(c=>hiddenCats.add(c));buildCatPanel();syncCatBtn(cats);render();};
  syncCatBtn(cats);
}
function syncCatBtn(cats){
  const shown=cats.filter(c=>!hiddenCats.has(c)).length;
  document.getElementById('catBtn').textContent=
    shown===cats.length?'Categories ▾':`Categories (${shown}/${cats.length}) ▾`;
}
document.getElementById('catBtn').addEventListener('click',()=>{
  const p=document.getElementById('catPanel'); p.hidden=!p.hidden;
});
document.addEventListener('click',e=>{
  const p=document.getElementById('catPanel');
  if(!p.hidden && !e.target.closest('#catPanel') && e.target.id!=='catBtn') p.hidden=true;
});

async function loadBooks(){
  try{
    const r=await fetch('books.csv?t='+Date.now());
    if(!r.ok) return;
    const lines=(await r.text()).trim().split(/\r?\n/);
    for(const line of lines.slice(1)){
      const i=line.indexOf(',');
      if(i<1) continue;
      const b=line.slice(0,i).trim(), t=normTick(line.slice(i+1));
      if(!b||!t) continue;
      (books[b]=books[b]||new Set()).add(t);
    }
    const names=Object.keys(books);
    if(!names.length) return;
    const div=document.getElementById('books');
    const mk=(label,val)=>{
      const btn=document.createElement('button');
      btn.textContent=label;
      btn.onclick=()=>{book=val;div.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===btn));render();};
      return btn;
    };
    const all=mk('View all','');all.classList.add('on');div.appendChild(all);
    for(const n of names.sort()) div.appendChild(mk(n,n));
    div.hidden=false;
  }catch(e){}
}

async function load(){
  let text;
  try{
    const r=await fetch('digests/latest.csv?t='+Date.now());
    if(!r.ok) throw 0;
    text=await r.text();
  }catch(e){
    document.getElementById('out').innerHTML='<div class="state">No digest published yet. Run the workflow from the Actions tab, then reload.</div>';
    document.getElementById('meta').textContent='';
    return;
  }
  items=parseCSV(text).map(r=>({...r, time:(r.time_uk||'').slice(11,19)}))
    .sort((a,b)=>a.time<b.time?1:-1);
  const d=(items[0]&&items[0].time_uk||'').slice(0,10);
  const now=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('meta').textContent=`${d} · ${items.length} announcements since 07:00 UK · latest ${items[0]?items[0].time:''} · page checked ${now} · new data published every 5 minutes on weekdays`;
  buildCatPanel();
  document.getElementById('controls').hidden=false;
  render();
}

document.getElementById('copySel').addEventListener('click',()=>{
  const lines=items.filter(it=>selected.has(it.news_id))
    .map(it=>{
      let txt=`- ${shortName(it.company)} - ${it.headline}`;
      if(it.brief) txt+=`: ${it.brief}`;
      txt=txt.replace(/[.\s]+$/,'')+'.';
      return it.ticker?`${txt} ${bbg(it.ticker)}`:txt;
    });
  if(!lines.length) return;
  navigator.clipboard.writeText(lines.join('\n')).then(()=>{
    const btn=document.getElementById('copySel'); const o=btn.textContent;
    btn.textContent=`Copied ${lines.length}`; setTimeout(()=>{btn.textContent=o;},900);
  });
});
loadBooks();
// silently check for newly published data every 60s
setInterval(()=>{ load().catch(()=>{}); }, 60000);
document.getElementById('refresh').addEventListener('click',async()=>{
  const btn=document.getElementById('refresh');
  btn.disabled=true; btn.textContent='Refreshing…';
  try{ await load(); } finally { btn.disabled=false; btn.textContent='Refresh'; }
});
document.getElementById('q').addEventListener('input',e=>{q=e.target.value.trim().toLowerCase();render();});
load();
</script>
</body>
</html>
