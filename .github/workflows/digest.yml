name: LSE digest

on:
  schedule:
    # Hourly through the UK trading day so the Pages site stays fresh.
    # Cron is UTC; the guard below only lets runs proceed when London
    # local time is between 07:00 and 18:59, which handles GMT/BST.
    - cron: "20 6-18 * * 1-5"
  workflow_dispatch: {}   # manual trigger — run any time, pulls 07:00 up to now for today

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Only run 07:00-18:59 London time
        if: github.event_name == 'schedule'
        run: |
          HOUR=$(TZ=Europe/London date +%H)
          if [ "$HOUR" -lt 7 ] || [ "$HOUR" -gt 18 ]; then
            echo "London hour is $HOUR — outside 07-18, skipping."
            echo "SKIP=1" >> $GITHUB_ENV
          fi

      - uses: actions/checkout@v5
        if: env.SKIP != '1'

      - uses: actions/setup-python@v6
        if: env.SKIP != '1'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: env.SKIP != '1'
        run: pip install pypdf

      - name: Pull, enrich and summarise announcements from 07:00 onwards
        if: env.SKIP != '1'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DATE=$(TZ=Europe/London date +%F)
          python3 summarize.py --since 07:00 \
            --out "digests/${DATE}-morning.md" --csv "digests/${DATE}-morning.csv"
          cp "digests/${DATE}-morning.md" digests/latest.md
          cp "digests/${DATE}-morning.csv" digests/latest.csv

      - name: Commit digest
        if: env.SKIP != '1'
        run: |
          git config user.name "lse-digest-bot"
          git config user.email "actions@github.com"
          git add digests/
          git diff --cached --quiet || git commit -m "Digest $(TZ=Europe/London date '+%F %H:%M')"
          git push
