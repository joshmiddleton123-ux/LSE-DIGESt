name: Morning LSE digest

on:
  schedule:
    # RNS's main burst lands at 07:00 UK. Cron is UTC and the UK flips
    # GMT/BST, so we schedule both candidate times and a guard step below
    # lets only the one where London time is 07:xx proceed.
    - cron: "20 6 * * 1-5"   # 07:20 London during BST (summer)
    - cron: "20 7 * * 1-5"   # 07:20 London during GMT (winter)
  workflow_dispatch: {}   # manual trigger — run any time of day, pulls 07:00 up to now for today

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Only run at 07:20 London time
        if: github.event_name == 'schedule'
        run: |
          HOUR=$(TZ=Europe/London date +%H)
          if [ "$HOUR" != "07" ]; then
            echo "London hour is $HOUR, not 07 — skipping (this is the off-season cron)."
            echo "SKIP=1" >> $GITHUB_ENV
          fi

      - uses: actions/checkout@v5
        if: env.SKIP != '1'

      - uses: actions/setup-python@v6
        if: env.SKIP != '1'
        with:
          python-version: "3.12"

      - name: Pull announcements from 07:00 onwards
        if: env.SKIP != '1'
        run: |
          DATE=$(TZ=Europe/London date +%F)
          python3 lse_news_digest.py --since 07:00 \
            --out "digests/${DATE}-morning.md" --csv "digests/${DATE}-morning.csv"
          cp "digests/${DATE}-morning.md" digests/latest.md

      - name: Commit digest
        if: env.SKIP != '1'
        run: |
          git config user.name "lse-digest-bot"
          git config user.email "actions@github.com"
          git add digests/
          git diff --cached --quiet || git commit -m "Morning digest $(TZ=Europe/London date +%F)"
          git push
